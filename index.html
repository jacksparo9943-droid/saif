<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موسوعة العالم الكروية | سيف</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --primary: #3b82f6;
            --secondary: #10b981;
            --accent: #f59e0b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass-bg: rgba(30, 41, 59, 0.85);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Navigation */
        .sidebar {
            width: 280px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border-left: 1px solid var(--glass-border);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 1000;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .brand {
            text-align: center;
            margin-bottom: 40px;
        }

        .brand i {
            font-size: 3rem;
            color: var(--accent);
            margin-bottom: 15px;
            filter: drop-shadow(0 0 10px rgba(245, 158, 11, 0.5));
        }

        .brand h2 {
            font-size: 1.5rem;
            font-weight: 900;
            background: linear-gradient(to left, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .nav-link {
            padding: 15px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 600;
            color: var(--text-muted);
            background: transparent;
            border: 1px solid transparent;
        }

        .nav-link:hover, .nav-link.active {
            background: rgba(59, 130, 246, 0.1);
            color: var(--primary);
            border-color: rgba(59, 130, 246, 0.3);
        }

        .nav-link.active {
            box-shadow: inset 4px 0 0 var(--primary);
        }

        .close-sidebar {
            display: none;
            position: absolute;
            top: 20px;
            left: 20px;
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 1.5rem;
            cursor: pointer;
        }

        /* Main Content */
        .main-content {
            margin-right: 280px;
            width: calc(100% - 280px);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Hero Section (Ronaldo Banner) */
        .hero {
            position: relative;
            height: 400px;
            background: url('assets/ronaldo.png') center/cover no-repeat;
            background-position: center 25%;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 4px solid var(--accent);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(15, 23, 42, 0.3), var(--bg-dark));
        }

        .hero-content {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 100%;
            padding: 0 20px;
        }

        .mobile-header {
            display: none;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 20px;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 20;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }

        .mobile-menu-btn {
            background: none;
            border: none;
            color: var(--white);
            font-size: 2rem;
            cursor: pointer;
        }

        .project-badge {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid var(--secondary);
            color: var(--secondary);
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1.1rem;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.2);
            margin-bottom: 20px;
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--text-main);
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
            margin-bottom: 30px;
        }

        .search-box {
            position: relative;
            max-width: 600px;
            margin: 0 auto;
        }

        .search-box input {
            width: 100%;
            background: rgba(30, 41, 59, 0.8);
            border: 2px solid rgba(255,255,255,0.2);
            color: var(--text-main);
            padding: 18px 25px 18px 50px;
            border-radius: 30px;
            font-family: inherit;
            font-size: 1.1rem;
            outline: none;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        .search-box input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
            background: rgba(30, 41, 59, 0.95);
        }

        .search-box i {
            position: absolute;
            left: 25px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.2rem;
        }

        /* Content Area */
        .content-area {
            padding: 40px;
            flex: 1;
        }

        .type-tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            border-bottom: 2px solid var(--bg-card);
            padding-bottom: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .type-tab {
            background: none;
            border: none;
            color: var(--text-muted);
            font-family: inherit;
            font-size: 1.3rem;
            font-weight: 800;
            cursor: pointer;
            position: relative;
            padding: 10px 20px;
            transition: all 0.3s;
        }

        .type-tab.active {
            color: var(--text-main);
        }

        .type-tab.active::after {
            content: '';
            position: absolute;
            bottom: -17px;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--accent);
            border-radius: 2px 2px 0 0;
        }

        /* Stats */
        .loading-state {
            text-align: center;
            padding: 50px;
            font-size: 1.5rem;
            color: var(--accent);
            display: none;
        }
        .loading-state i {
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .stats-info {
            text-align: center;
            margin-bottom: 30px;
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* Cards Grid */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid var(--glass-border);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            cursor: pointer;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 5px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            opacity: 0;
            transition: opacity 0.3s;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            border-color: rgba(255,255,255,0.2);
            z-index: 10;
        }

        .card:hover::before { opacity: 1; }

        .card img {
            width: 100px;
            height: 70px;
            object-fit: contain;
            margin-bottom: 20px;
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            padding: 5px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .card h3 {
            font-size: 1.4rem;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .card .subtitle {
            color: var(--accent);
            font-weight: 700;
            margin-bottom: 15px;
            font-size: 0.95rem;
            text-transform: uppercase;
        }

        .card .info {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--bg-card); border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        /* Responsive */
        @media (max-width: 1024px) {
            .sidebar {
                transform: translateX(100%);
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .close-sidebar { display: block; }
            .main-content {
                margin-right: 0;
                width: 100%;
            }
            .mobile-header { display: flex; }
            .hero { height: 450px; padding-top: 60px; }
            .hero h1 { font-size: 2.5rem; }
            .content-area { padding: 20px; }
            .type-tabs { gap: 10px; }
            .type-tab { font-size: 1.1rem; padding: 10px; }
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <button class="close-sidebar" onclick="toggleMenu()"><i class="fas fa-times"></i></button>
        <div class="brand">
            <i class="fas fa-globe"></i>
            <h2>موسوعة العالم</h2>
        </div>
        <ul class="nav-links">
            <li class="nav-link active" data-continent="all"><i class="fas fa-globe-americas"></i> كل القارات</li>
            <li class="nav-link" data-continent="africa"><i class="fas fa-globe-africa"></i> إفريقيا</li>
            <li class="nav-link" data-continent="europe"><i class="fas fa-globe-europe"></i> أوروبا</li>
            <li class="nav-link" data-continent="asia"><i class="fas fa-globe-asia"></i> آسيا</li>
            <li class="nav-link" data-continent="americas"><i class="fas fa-map-marked-alt"></i> الأمريكيتين</li>
        </ul>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Hero with Ronaldo -->
        <div class="hero">
            <div class="mobile-header">
                <div style="font-weight: 800; font-size: 1.2rem; color: var(--accent);">موسوعة سيف</div>
                <button class="mobile-menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
            </div>
            <div class="hero-content">
                <div class="project-badge">
                    <i class="fas fa-laptop-code"></i> مشروع الاعلام الالي للتلميذ: سيف (سنة 1 ثانوي)
                </div>
                <h1>أكبر موسوعة لأندية ومنتخبات العالم</h1>
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="ابحث عن أي منتخب أو نادي في العالم...">
                </div>
            </div>
        </div>

        <!-- Data Area -->
        <div class="content-area">
            <div class="type-tabs">
                <button class="type-tab active" data-type="national">جميع منتخبات العالم</button>
                <button class="type-tab" data-type="club">أشهر أندية العالم</button>
            </div>

            <div class="stats-info" id="statsInfo">يتم عرض البيانات...</div>
            <div class="loading-state" id="loadingState"><i class="fas fa-circle-notch"></i> جاري تحميل منتخبات العالم من قاعدة البيانات...</div>
            
            <div class="grid-container" id="gridContainer">
                <!-- Content will be generated by JS -->
            </div>
        </div>
    </main>

    <script>
        // Massive Static Database for CLUBS (Since no free API provides all clubs)
        const clubsDatabase = [
            // Africa (Excluding Morocco)
            { name: "الأهلي", subtitle: "مصر", type: "club", continent: "africa", img: "https://upload.wikimedia.org/wikipedia/ar/2/21/Al_Ahly_SC_logo.png", info: "نادي القرن في إفريقيا والأكثر تتويجاً بدوري أبطال إفريقيا." },
            { name: "الزمالك", subtitle: "مصر", type: "club", continent: "africa", img: "https://upload.wikimedia.org/wikipedia/ar/b/b8/Zamalek_SC_logo.png", info: "أحد عمالقة القارة السمراء وثاني أكثر الأندية تتويجاً بالبطولات القارية في مصر." },
            { name: "الترجي", subtitle: "تونس", type: "club", continent: "africa", img: "https://upload.wikimedia.org/wikipedia/ar/8/86/Esperance_Sportive_de_Tunis.png", info: "غول إفريقيا ونادي العاصمة التونسية العريق." },
            { name: "صن داونز", subtitle: "جنوب إفريقيا", type: "club", continent: "africa", img: "https://upload.wikimedia.org/wikipedia/en/e/e6/Mamelodi_Sundowns_logo.png", info: "برازيليون إفريقيا، يمتلكون أقوى الأكاديميات وأسلوب لعب أوروبي حديث." },
            { name: "تي بي مازيمبي", subtitle: "الكونغو الديمقراطية", type: "club", continent: "africa", img: "https://upload.wikimedia.org/wikipedia/en/3/30/TP_Mazembe_logo.png", info: "أول نادي إفريقي يصل لنهائي كأس العالم للأندية." },
            { name: "إنيمبا", subtitle: "نيجيريا", type: "club", continent: "africa", img: "https://upload.wikimedia.org/wikipedia/en/7/75/Enyimba_FC.png", info: "الفيل الأزرق النيجيري وبطل دوري الأبطال مرتين." },
            { name: "النجم الساحلي", subtitle: "تونس", type: "club", continent: "africa", img: "https://upload.wikimedia.org/wikipedia/ar/d/d7/Etoile_du_sahel_logo.png", info: "جوهرة الساحل التونسي وأحد الأندية القليلة التي فازت بكل البطولات القارية الممكنة." },

            // Europe
            { name: "ريال مدريد", subtitle: "إسبانيا", type: "club", continent: "europe", img: "https://upload.wikimedia.org/wikipedia/en/5/56/Real_Madrid_CF.svg", info: "ملك أوروبا بلا منازع، وأكثر الأندية تتويجاً بدوري الأبطال." },
            { name: "برشلونة", subtitle: "إسبانيا", type: "club", continent: "europe", img: "https://upload.wikimedia.org/wikipedia/en/4/47/FC_Barcelona_%28crest%29.svg", info: "مدرسة التيكي تاكا والنادي الذي أخرج ليونيل ميسي للعالم." },
            { name: "مانشستر سيتي", subtitle: "إنجلترا", type: "club", continent: "europe", img: "https://upload.wikimedia.org/wikipedia/en/e/eb/Manchester_City_FC_badge.svg", info: "أقوى الأندية الإنجليزية في العقد الأخير بقيادة بيب جوارديولا." },
            { name: "بايرن ميونخ", subtitle: "ألمانيا", type: "club", continent: "europe", img: "https://upload.wikimedia.org/wikipedia/commons/1/1b/FC_Bayern_M%C3%BCnchen_logo_%282017%29.svg", info: "العملاق البافاري وآلة الانتصارات الألمانية." },
            { name: "يوفنتوس", subtitle: "إيطاليا", type: "club", continent: "europe", img: "https://upload.wikimedia.org/wikipedia/commons/b/bc/Juventus_FC_-_rect_logo_black_%28ab_2017%29.svg", info: "السيدة العجوز وأكثر الأندية حصداً للبطولات في إيطاليا." },
            { name: "ليفربول", subtitle: "إنجلترا", type: "club", continent: "europe", img: "https://upload.wikimedia.org/wikipedia/en/0/0c/Liverpool_FC.svg", info: "نادي الريدز العريق ومعقل الأسطورة محمد صلاح." },
            { name: "باريس سان جيرمان", subtitle: "فرنسا", type: "club", continent: "europe", img: "https://upload.wikimedia.org/wikipedia/en/a/a7/Paris_Saint-Germain_F.C..svg", info: "فريق العاصمة الفرنسية المليء بالنجوم العالميين." },

            // Asia
            { name: "النصر", subtitle: "السعودية", type: "club", continent: "asia", img: "https://upload.wikimedia.org/wikipedia/en/b/b3/Al-Nassr_FC_logo.svg", info: "نادي 'العالمي'، النادي الذي فجر ثورة التعاقدات بضم الأسطورة كريستيانو رونالدو." },
            { name: "الهلال", subtitle: "السعودية", type: "club", continent: "asia", img: "https://upload.wikimedia.org/wikipedia/en/8/81/Al_Hilal_SFC_Logo.svg", info: "زعيم آسيا والأكثر تتويجاً بدوري أبطال آسيا عبر التاريخ." },
            { name: "أوراوا ريد دايموندز", subtitle: "اليابان", type: "club", continent: "asia", img: "https://upload.wikimedia.org/wikipedia/en/b/b2/Urawa_Red_Diamonds_logo.svg", info: "فريق الألماس الأحمر، من أقوى وأعرق الأندية اليابانية." },
            { name: "العين", subtitle: "الإمارات", type: "club", continent: "asia", img: "https://upload.wikimedia.org/wikipedia/en/a/a2/Al_Ain_FC_logo.svg", info: "زعيم الإمارات وبطل آسيا الأول في النسخة الحديثة." },
            { name: "السد", subtitle: "قطر", type: "club", continent: "asia", img: "https://upload.wikimedia.org/wikipedia/en/6/63/AlSadd_SC.png", info: "الزعيم القطري وأكثر أندية بلاده فوزاً بالبطولات المحلية والآسيوية." },

            // Americas
            { name: "بوكا جونيورز", subtitle: "الأرجنتين", type: "club", continent: "americas", img: "https://upload.wikimedia.org/wikipedia/commons/9/91/Boca_Juniors_logo.png", info: "صاحب أقوى جمهور في العالم وملعب البومبونيرا الأسطوري." },
            { name: "فلامنغو", subtitle: "البرازيل", type: "club", continent: "americas", img: "https://upload.wikimedia.org/wikipedia/commons/9/93/Flamengo-RJ_%28BRA%29.png", info: "الفريق الأكثر شعبية في البرازيل وبطل الليبرتادوريس لعدة مرات." },
            { name: "ريفر بليت", subtitle: "الأرجنتين", type: "club", continent: "americas", img: "https://upload.wikimedia.org/wikipedia/commons/3/3f/Logo_River_Plate.png", info: "نادي 'المليونيرات' والغريم التقليدي للبوكا." },
            { name: "بالميراس", subtitle: "البرازيل", type: "club", continent: "americas", img: "https://upload.wikimedia.org/wikipedia/commons/1/10/Palmeiras_logo.svg", info: "أحد عمالقة ساو باولو والمسيطر على البطولات البرازيلية مؤخراً." },
            { name: "كلوب أمريكا", subtitle: "المكسيك", type: "club", continent: "americas", img: "https://upload.wikimedia.org/wikipedia/en/2/2b/Club_Am%C3%A9rica_logo.svg", info: "أقوى وأغنى أندية المكسيك وكونكاكاف بأسره." }
        ];

        let globalNationalTeams = [];
        let combinedDatabase = [...clubsDatabase];
        let currentContinent = 'all';
        let currentType = 'national';
        let searchQuery = '';

        const grid = document.getElementById('gridContainer');
        const searchInput = document.getElementById('searchInput');
        const loadingState = document.getElementById('loadingState');
        const statsInfo = document.getElementById('statsInfo');

        // Map API Regions to our Continents
        function mapRegion(region) {
            if (region === 'Africa') return 'africa';
            if (region === 'Europe') return 'europe';
            if (region === 'Asia' || region === 'Oceania') return 'asia'; // Combined for simplicity
            if (region === 'Americas') return 'americas';
            return 'all';
        }

        // Fetch All National Teams from World API
        async function fetchAllNationalTeams() {
            if (globalNationalTeams.length > 0) return; // Already fetched
            
            loadingState.style.display = 'block';
            grid.innerHTML = '';
            statsInfo.innerHTML = '';

            try {
                const response = await fetch('https://restcountries.com/v3.1/all?fields=name,flags,region,translations,population');
                const countries = await response.json();
                
                countries.forEach(country => {
                    // EXCLUDE MOROCCO BY NAME IN ARABIC OR ENGLISH
                    const engName = country.name.common.toLowerCase();
                    const araName = country.translations.ara ? country.translations.ara.common : "";
                    
                    if (engName === 'morocco' || araName.includes('المغرب') || engName.includes('western sahara')) {
                        return; // Skip Morocco entirely
                    }

                    // Only add actual countries (exclude very small islands if needed, but the prompt says "All")
                    globalNationalTeams.push({
                        name: araName || country.name.common,
                        subtitle: country.name.common,
                        type: "national",
                        continent: mapRegion(country.region),
                        img: country.flags.png,
                        info: `منتخب وطني يمثل دولة تقع في قارة ${country.region}. التعداد السكاني التقريبي: ${(country.population / 1000000).toFixed(1)} مليون نسمة.`
                    });
                });

                // Add API teams to the combined database
                combinedDatabase = [...clubsDatabase, ...globalNationalTeams];
                
                loadingState.style.display = 'none';
                renderGrid();

            } catch (error) {
                console.error("Error fetching teams:", error);
                loadingState.style.display = 'none';
                grid.innerHTML = '<div style="color:red; text-align:center; grid-column:1/-1;">حدث خطأ في تحميل قاعدة البيانات العالمية. سيتم عرض الفرق المحفوظة فقط.</div>';
                renderGrid();
            }
        }

        function renderGrid() {
            grid.innerHTML = '';
            
            const filteredData = combinedDatabase.filter(item => {
                const matchContinent = currentContinent === 'all' || item.continent === currentContinent;
                const matchType = item.type === currentType;
                const matchSearch = item.name.includes(searchQuery) || item.subtitle.includes(searchQuery);
                return matchContinent && matchType && matchSearch;
            });

            statsInfo.innerHTML = `يتم عرض <strong>${filteredData.length}</strong> ${currentType === 'national' ? 'منتخباً' : 'نادياً'}`;

            if (filteredData.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); font-size: 1.2rem; padding: 50px;">لا توجد نتائج مطابقة لخياراتك.</div>';
                return;
            }

            filteredData.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img src="${item.img}" alt="${item.name}" loading="lazy" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'100\\' height=\\'100\\'><rect width=\\'100\\' height=\\'100\\' fill=\\'%231e293b\\'/><text x=\\'50\\' y=\\'50\\' font-family=\\'Arial\\' font-size=\\'14\\' fill=\\'%2394a3b8\\' text-anchor=\\'middle\\' dy=\\'.3em\\'>Logo</text></svg>'">
                    <h3>${item.name}</h3>
                    <div class="subtitle">${item.subtitle}</div>
                    <div class="info">${item.info}</div>
                `;
                grid.appendChild(card);
            });
        }

        // Event Listeners for Sidebar
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', (e) => {
                document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                e.currentTarget.classList.add('active');
                currentContinent = e.currentTarget.getAttribute('data-continent');
                renderGrid();
                
                if(window.innerWidth <= 1024) {
                    toggleMenu();
                }
            });
        });

        // Event Listeners for Tabs
        document.querySelectorAll('.type-tab').forEach(tab => {
            tab.addEventListener('click', (e) => {
                document.querySelectorAll('.type-tab').forEach(t => t.classList.remove('active'));
                e.currentTarget.classList.add('active');
                currentType = e.currentTarget.getAttribute('data-type');
                
                // If national teams clicked and not fetched yet, fetch them
                if (currentType === 'national' && globalNationalTeams.length === 0) {
                    fetchAllNationalTeams();
                } else {
                    renderGrid();
                }
            });
        });

        // Search Input
        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderGrid();
        });

        // Mobile Menu Toggle
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        // Init App: Fetch National Teams first so it looks like a massive database immediately
        fetchAllNationalTeams();

    </script>
</body>
</html>
